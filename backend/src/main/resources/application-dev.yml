# ============================================================================
# Brilliant Seas — Development Profile
# Overrides for local development only. NEVER deploy with this profile.
# ============================================================================

spring:
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/brilliantseas
    username: ${DB_APP_USER:${DB_POSTGRES_USER:postgres}}
    password: ${DB_APP_PASSWORD:${DB_POSTGRES_PASSWORD:postgres_superuser_pass}}
    hikari:
      maximum-pool-size: 5

  data:
    redis:
      password: ${REDIS_PASSWORD:dev_redis_pass}

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: false   # Use logging.level instead for controlled output

  flyway:
    clean-disabled: false   # Allow flyway:clean in dev only

logging:
  level:
    com.brilliantseas: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

security:
  cookies:
    secure: false
    same-site: Strict
  jwt:
    private-key-path: classpath:keys/private.pem
    public-key-path: classpath:keys/public.pem
  encryption:
    pii-key: dev-only-encryption-key-never-use-in-prod
  rate-limit:
    enabled: false   # Disable rate limiting in dev for easier testing
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5500,http://localhost:8080

server:
  error:
    include-message: always       # Show validation messages in dev
    include-binding-errors: always

management:
  endpoint:
    health:
      show-details: always   # OK in dev
      show-components: always
