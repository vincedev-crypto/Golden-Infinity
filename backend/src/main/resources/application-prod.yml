# ============================================================================
# Brilliant Seas — Production Profile
#
# ZERO SECRETS IN THIS FILE — All from environment variables or Vault
# This file only contains production-specific OVERRIDES
# ============================================================================

spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: ${DB_POOL_MIN:5}
      # Enable SSL for production database connections
      data-source-properties:
        ssl: true
        sslmode: verify-full
        sslrootcert: ${DB_SSL_ROOT_CERT:/etc/ssl/certs/rds-ca-bundle.pem}

  flyway:
    clean-disabled: true    # NEVER allow flyway:clean in production

  jpa:
    properties:
      hibernate:
        generate_statistics: false
        format_sql: false

security:
  rate-limit:
    enabled: true
  cors:
    allowed-origins: ${CORS_ORIGINS:https://brilliantseas.com.ph}

server:
  port: 8080
  tomcat:
    max-threads: 200
    accept-count: 100

logging:
  level:
    root: WARN
    com.brilliantseas: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: OFF
