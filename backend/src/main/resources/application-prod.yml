# ============================================================================
# Brilliant Seas — Production Profile
#
# ZERO SECRETS IN THIS FILE — All from environment variables or Vault
# This file only contains production-specific OVERRIDES
# ============================================================================

spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: ${DB_POOL_MIN:5}

  data:
    redis:
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

  flyway:
    clean-disabled: true    # NEVER allow flyway:clean in production

  jpa:
    properties:
      hibernate:
        generate_statistics: false
        format_sql: false

security:
  rate-limit:
    enabled: true
  cookies:
    secure: ${SECURITY_COOKIES_SECURE:true}
    same-site: ${SECURITY_COOKIES_SAME_SITE:None}
  cors:
    allowed-origins: ${CORS_ORIGINS:https://golden-infinity.onrender.com,http://goldeninfinity.com.ph,https://goldeninfinity.com.ph,http://www.goldeninfinity.com.ph,https://www.goldeninfinity.com.ph}

server:
  port: ${PORT:${SERVER_PORT:8080}}
  tomcat:
    max-threads: 200
    accept-count: 100

logging:
  level:
    root: WARN
    com.brilliantseas: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: OFF
